name: test1
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  http: ^1.2.2
  url_launcher: ^6.3.0
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.5.5
  cupertino_icons: ^1.0.8
  intl: ^0.18.0
  
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ... ваш код

flutter_launcher_icons:
  android: true          # Генерировать иконку для Android
  ios: true              # Генерировать иконку для iOS
  image_path: "assets/images/logo.png"  # ПУТЬ К ВАШЕЙ ИКОНКЕ (1024x1024px)
  adaptive_icon_background: "#FF1D1D1D" # Цвет фона для адаптивной иконки Android
  adaptive_icon_foreground: "assets/images/logo.png" # (Опционально) Иконка на переднем плане

flutter_native_splash:
  color: "1D1D1D"                 # Основной цвет фона экрана запуска
  image: "assets/images/logo.png" # ПУТЬ К ВАШЕМУ ИЗОБРАЖЕНИЮ
  android: true                    # Применить для Android
  ios: true                        # Применить для iOS
  android_12:
    color: "1D1D1D"           # Тот же цвет фона
    image: "assets/images/logo.png"   # Та же иконка или другая
    # Если у иконки есть фон, можно настроить его цвет:
    # icon_background_color: "1D1D1D"
